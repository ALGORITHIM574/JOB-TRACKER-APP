<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <title>JOB TRACKER APP</title>
</head>

<body>

<header> 
    <h1>JOB TRACKER APP</h1>
    <p>This is where you find all your jobs in one place</p>
</header>
<!-- THIS IS THE AUTH SECTION -->
 <section id="auth" class="auth">
    <h2>Login / Sign Up</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="password" required>
    <button id="signUpBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
 </section>

<main class="container">

<section class="main">
<form id="jobForm">
    <input type="text" id="company" placeholder="Company Name" required>
    <input type="text" id="role" placeholder="Job Role" required>
    <input type="date" id="myDate">
    
    <select id="status">
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
    </select>

    <button type="submit">Add Job</button>
</form>
</section>

<section class="job-list">
    <h2>Your Applications</h2>
    <ul id="jobList" class="list"></ul>
</section>

</main>

<footer class="footer">
    <p>designed and build by ZERO ERROR COMPANY</p>
    &copy; 2026 My Website. All rights reserved.
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="script.js"></script>

</body>
</html>
